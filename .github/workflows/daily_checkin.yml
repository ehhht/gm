name: GameMale Daily Check-in

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Random delay (0-120 min)
        run: |
          DELAY=$((RANDOM % 121))
          echo "Sleeping ${DELAY} minutes..."
          sleep ${DELAY}m

      - name: Run check-in
        env:
          GM_USERNAME: ${{ secrets.GM_USERNAME }}
          GM_PASSWORD: ${{ secrets.GM_PASSWORD }}
          GM_COOKIE: ${{ secrets.GM_COOKIE }}
        run: |
          python gamemale_bot.py
